<!DOCTYPE html>
<html>
<head>
  <title>Global Fundraiser</title>

  <script src="//unpkg.com/globe.gl"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #aee7ff; /* sky blue */
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 48px;
    }

    h2 {
      margin-top: 10px;
      font-weight: normal;
      color: #333;
    }

    /* Globe container */
    #globeContainer {
      margin: 60px auto;
      width: 400px;
      height: 400px;
      position: relative;
    }

    /* Soft fade effect around globe */
    #globeContainer::after {
      content: "";
      position: absolute;
      top: -50px;
      left: -50px;
      right: -50px;
      bottom: -50px;
      background: radial-gradient(circle, rgba(174,231,255,0) 40%, #aee7ff 80%);
      pointer-events: none;
    }

    #globeViz {
      width: 100%;
      height: 100%;
    }

    /* Popup label */
    .label {
      background: white;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<h1>Title</h1>
<h2>Subheading</h2>

<div id="globeContainer">
  <div id="globeViz"></div>
</div>

<script>
  const locations = [
    {
      lat: 40.7128,
      lng: -74.0060,
      name: "Name #1",
      location: "New York, USA",
      page: "usa.html"
    },
    {
      lat: -1.2921,
      lng: 36.8219,
      name: "Name #2",
      location: "Nairobi, Kenya",
      page: "kenya.html"
    }
  ];

  const globe = Globe()
    (document.getElementById('globeViz'))

    // More colorful earth
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')

    // Add custom HTML markers (THIS gives you red pins)
    .htmlElementsData(locations)
    .htmlElement(d => {
      const el = document.createElement('div');

      el.innerHTML = `
        <div class="label">
          <strong>${d.name}</strong><br/>
          ${d.location}
        </div>
        <div style="font-size:20px; text-align:center;">📍</div>
      `;

      el.style.cursor = "pointer";

      el.onclick = () => {
        window.location.href = "./" + d.page;
      };

      return el;
    });
</script>

</body>
</html>
